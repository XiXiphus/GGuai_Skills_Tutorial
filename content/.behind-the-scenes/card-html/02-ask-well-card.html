<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg: #FBF9F1;
    --text: #1f2730;
    --muted: #66717d;
    --soft: #8d97a3;
    --rule: #d9e0e8;
    --accent: #6B4E3D;
    --accent-soft: rgba(107,78,61,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; background: var(--bg); color: var(--text); font-family: "KingHwa_OldSong", "Noto Serif CJK SC", "Noto Sans CJK SC", serif; }
  .card { width: 1080px; padding: 56px 72px 44px; }
  .meta { display: flex; justify-content: space-between; font-size: 16px; letter-spacing: 0.16em; color: var(--soft); text-transform: uppercase; margin-bottom: 28px; }
  .title { font-size: 80px; line-height: 1.0; letter-spacing: -0.04em; font-weight: 750; margin-bottom: 20px; }
  .subtitle { font-size: 30px; line-height: 1.72; color: #4e5965; max-width: 780px; margin-bottom: 44px; }
  .rule { height: 1px; background: var(--rule); margin-bottom: 38px; }
  .body p { font-size: 29px; line-height: 1.86; margin-bottom: 18px; }
  .five { display: grid; grid-template-columns: 1fr; gap: 0; margin: 24px 0 34px; }
  .five-item { display: grid; grid-template-columns: 140px minmax(0, 1fr); gap: 20px; align-items: baseline; padding: 22px 0; border-bottom: 1px solid var(--rule); }
  .five-item:last-child { border-bottom: none; }
  .five-label { font: 700 30px/1.3 "KingHwa_OldSong", "Noto Serif CJK SC", serif; color: var(--accent); }
  .five-desc { font-size: 28px; line-height: 1.72; color: var(--text); }
  .template { margin: 34px 0; padding: 24px 30px; background: rgba(107,78,61,0.06); border-left: 4px solid var(--accent); }
  .template p { font-size: 30px; line-height: 1.7; font-weight: 500; margin: 0; }
  .closing { margin-top: 38px; padding-top: 22px; border-top: 1px solid var(--rule); }
  .closing .final { font-size: 38px; line-height: 1.55; font-weight: 650; margin-bottom: 0; }
  .footer { display: flex; justify-content: space-between; margin-top: 48px; padding-top: 18px; border-top: 1px solid var(--rule); color: var(--soft); font-size: 18px; letter-spacing: 0.08em; }
</style>
</head>
<body>
  <div class="card">
    <div class="meta"><span>GF Skills Course</span><span>Lesson 2</span></div>
    <div class="title">好请求五件套</div>
    <div class="subtitle">开口之前，想清楚这五件事。不是 prompt 越长越好，是这五件事越清楚越好。</div>
    <div class="rule"></div>
    <div class="five">
      <div class="five-item"><div class="five-label">材料</div><div class="five-desc">你手里有什么？</div></div>
      <div class="five-item"><div class="five-label">目标</div><div class="five-desc">你想把它变成什么？</div></div>
      <div class="five-item"><div class="five-label">对象</div><div class="five-desc">说给谁听？</div></div>
      <div class="five-item"><div class="five-label">限制</div><div class="five-desc">有什么边界？</div></div>
      <div class="five-item"><div class="five-label">产物</div><div class="five-desc">最后要什么格式？</div></div>
    </div>
    <div class="template">
      <p>我有【材料】，想请你帮我【目标】，<br>说给【对象】听，要【产物】，注意【限制】。</p>
    </div>
    <div class="closing">
      <p class="final">不是 prompt 越长越好。<br>是这五件事越清楚越好。</p>
    </div>
    <div class="footer"><span>不是魔法，是工法。</span><span>GF Skills Course</span></div>
  </div>
</body>
</html>
