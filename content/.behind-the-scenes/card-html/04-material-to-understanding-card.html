<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg: #F4F8F6;
    --text: #1f2730;
    --muted: #66717d;
    --soft: #8d97a3;
    --rule: #d1ddd6;
    --accent: #2D6A4F;
    --accent-soft: rgba(45,106,79,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; background: var(--bg); color: var(--text); font-family: "KingHwa_OldSong", "Noto Serif CJK SC", "Noto Sans CJK SC", serif; }
  .card { width: 1080px; padding: 56px 72px 44px; }
  .meta { display: flex; justify-content: space-between; font-size: 16px; letter-spacing: 0.16em; color: var(--soft); text-transform: uppercase; margin-bottom: 28px; }
  .title { font-size: 78px; line-height: 1.0; letter-spacing: -0.04em; font-weight: 750; margin-bottom: 20px; }
  .subtitle { font-size: 28px; line-height: 1.72; color: #4e5965; max-width: 800px; margin-bottom: 40px; }
  .rule { height: 1px; background: var(--rule); margin-bottom: 36px; }
  .inputs { display: grid; grid-template-columns: 1fr; gap: 0; }
  .input-row { display: grid; grid-template-columns: 160px minmax(0,1fr) 180px; gap: 20px; align-items: baseline; padding: 22px 0; border-bottom: 1px solid var(--rule); }
  .input-row:last-child { border-bottom: none; }
  .input-type { font: 700 28px/1.3 "KingHwa_OldSong", "Noto Serif CJK SC", serif; color: var(--accent); }
  .input-open { font-size: 26px; line-height: 1.7; color: var(--text); }
  .input-skill { font: 600 22px/1.3 "SFMono-Regular", "Menlo", monospace; color: var(--accent); background: var(--accent-soft); padding: 6px 12px; border-radius: 999px; white-space: nowrap; height: fit-content; }
  .rhyme { margin: 36px 0; padding: 22px 28px; border-left: 4px solid var(--accent); background: linear-gradient(90deg, rgba(45,106,79,0.06), transparent); }
  .rhyme p { font-size: 34px; line-height: 1.65; font-weight: 600; margin: 0; }
  .footer { display: flex; justify-content: space-between; margin-top: 46px; padding-top: 18px; border-top: 1px solid var(--rule); color: var(--soft); font-size: 18px; letter-spacing: 0.08em; }
</style>
</head>
<body>
  <div class="card">
    <div class="meta"><span>GF Skills Course</span><span>Lesson 4</span></div>
    <div class="title">四种输入，<br>四种开口</div>
    <div class="subtitle">手里拿的东西不同，第一句话也不同。先分清入口，再决定用什么刀。</div>
    <div class="rule"></div>
    <div class="inputs">
      <div class="input-row">
        <div class="input-type">文件</div>
        <div class="input-open">"这是关于 X 的 Y，我想先知道最核心的 N 个观点"</div>
        <div><span class="input-skill">ljg-rank</span></div>
      </div>
      <div class="input-row">
        <div class="input-type">网址</div>
        <div class="input-open">"这篇讲 X，我想知道作者反对什么常见说法"</div>
        <div><span class="input-skill">ljg-rank</span></div>
      </div>
      <div class="input-row">
        <div class="input-type">粘贴文本</div>
        <div class="input-open">"这段话说 X，我想知道它从哪来、有什么支撑"</div>
        <div><span class="input-skill">ljg-learn</span></div>
      </div>
      <div class="input-row">
        <div class="input-type">概念</div>
        <div class="input-open">"我想理解 X，你先列出最常被误解的 N 个点"</div>
        <div><span class="input-skill">ljg-learn</span></div>
      </div>
    </div>
    <div class="rhyme">
      <p>文件先降秩，链接找对抗，<br>段落问源头，概念建地图。</p>
    </div>
    <div class="footer"><span>不是魔法，是工法。</span><span>GF Skills Course</span></div>
  </div>
</body>
</html>
